<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>Mail Attachment Downloader</title>
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
        :root{--primary:#1a73e8;--primary-dark:#1557b0;--surface:#ffffff;--surface-variant:#f1f3f4;--on-surface:#202124;--on-surface-variant:#5f6368;--outline:#dadce0;--error:#d93026;--success:#1e8e3e}
        body{font-family:'Google Sans',-apple-system,BlinkMacSystemFont,sans-serif;background:var(--surface);color:var(--on-surface);min-height:100vh}
        .phone-frame{max-width:420px;margin:0 auto;min-height:100vh;position:relative;background:var(--surface)}
        .status-bar{display:flex;justify-content:space-between;align-items:center;padding:8px 16px;font-size:12px;font-weight:500;background:var(--surface)}
        .status-time{font-weight:600}
        .status-icons{display:flex;gap:6px;align-items:center}
        .status-icons svg{width:16px;height:16px;fill:var(--on-surface)}
        .app-bar{display:flex;align-items:center;padding:12px 16px;background:var(--surface)}
        .app-bar h1{flex:1;font-size:22px;font-weight:500}
        .icon-btn{width:40px;height:40px;border-radius:50%;border:none;background:transparent;display:flex;align-items:center;justify-content:center;cursor:pointer}
        .icon-btn svg{width:24px;height:24px;fill:var(--on-surface)}
        .search-bar{margin:0 16px 12px;display:flex;gap:12px;align-items:center;background:var(--surface-variant);border-radius:28px;padding:8px 16px}
        .search-bar svg{width:24px;height:24px;fill:var(--on-surface-variant)}
        .search-bar input{flex:1;border:none;background:transparent;font-size:16px;color:var(--on-surface);outline:none}
        .accounts-scroll{display:flex;gap:8px;padding:0 16px 16px;overflow-x:auto;scrollbar-width:none}
        .accounts-scroll::-webkit-scrollbar{display:none}
        .account-chip{display:flex;align-items:center;gap:8px;padding:8px 16px;background:var(--surface-variant);border-radius:20px;border:2px solid transparent;cursor:pointer;white-space:nowrap;transition:all .2s}
        .account-chip.active{background:#e8f0fe;border-color:var(--primary)}
        .account-chip img{width:24px;height:24px;border-radius:50%}
        .account-chip span{font-size:13px;font-weight:500}
        .account-chip .dot{width:8px;height:8px;background:var(--success);border-radius:50%}
        .email-list{padding:0 16px;padding-bottom:100px}
        .section-header{display:flex;justify-content:space-between;align-items:center;padding:16px 0 12px}
        .section-header h2{font-size:14px;font-weight:600;color:var(--on-surface-variant);text-transform:uppercase;letter-spacing:.5px}
        .section-header span{font-size:13px;color:var(--primary);cursor:pointer}
        .email-item{display:flex;gap:12px;padding:16px;background:var(--surface);border:1px solid var(--outline);border-radius:16px;margin-bottom:8px;cursor:pointer;transition:all .2s}
        .email-item:active{background:var(--surface-variant)}
        .email-item.has-attachment{border-left:3px solid var(--primary)}
        .email-avatar{width:48px;height:48px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:600;color:#fff;flex-shrink:0}
        .email-content{flex:1;min-width:0}
        .email-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
        .email-from{font-size:15px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
        .email-time{font-size:12px;color:var(--on-surface-variant);flex-shrink:0}
        .email-subject{font-size:14px;margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
        .email-preview{font-size:13px;color:var(--on-surface-variant);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
        .attach-preview{display:flex;align-items:center;gap:8px;margin-top:8px;padding:8px 12px;background:#f0f7ff;border-radius:8px}
        .attach-icon{width:32px;height:32px;background:var(--primary);border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:14px}
        .attach-info{flex:1}
        .attach-name{font-size:13px;font-weight:500;max-width:200px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
        .attach-size{font-size:11px;color:var(--on-surface-variant)}
        .dl-btn{padding:6px 12px;background:var(--primary);color:#fff;border:none;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer}
        .bottom-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:420px;display:flex;justify-content:space-around;padding:12px 16px 24px;background:var(--surface);border-top:1px solid var(--outline)}
        .nav-item{display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;opacity:.6;transition:opacity .2s}
        .nav-item.active{opacity:1}
        .nav-item svg{width:24px;height:24px;fill:var(--on-surface)}
        .nav-item span{font-size:11px;font-weight:500}
        .fab{position:fixed;bottom:80px;right:16px;width:56px;height:56px;background:var(--primary);border-radius:16px;border:none;display:flex;align-items:center;justify-content:center;cursor:pointer;box-shadow:0 4px 12px rgba(26,115,232,.4)}
        .fab:active{transform:scale(.95)}
        .fab svg{width:24px;height:24px;fill:#fff}
        .tab{display:none;padding-bottom:100px}
        .tab.active{display:block}
        .dl-item{display:flex;align-items:center;gap:12px;padding:12px;background:#f0f7ff;border-radius:12px;margin-bottom:8px}
        .dl-icon{width:40px;height:40px;background:var(--primary);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px}
        .dl-info{flex:1}
        .dl-name{font-size:14px;font-weight:500}
        .dl-status{font-size:12px;color:var(--on-surface-variant)}
        .prog{width:100%;height:4px;background:var(--outline);border-radius:2px;margin-top:6px;overflow:hidden}
        .prog-fill{height:100%;background:var(--primary);border-radius:2px;width:0;transition:width .3s}
        .loading{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px}
        .spinner{width:40px;height:40px;border:3px solid var(--outline);border-top-color:var(--primary);border-radius:50%;animation:spin 1s linear infinite}
        @keyframes spin{to{transform:rotate(360deg)}}
        .loading p{margin-top:16px;color:var(--on-surface-variant)}
        .modal{position:fixed;inset:0;background:rgba(0,0,0,.5);display:flex;align-items:flex-end;justify-content:center;z-index:1000;opacity:0;visibility:hidden;transition:all .3s}
        .modal.active{opacity:1;visibility:visible}
        .modal-content{width:100%;max-width:420px;background:var(--surface);border-radius:24px 24px 0 0;padding:24px;transform:translateY(100%);transition:transform .3s}
        .modal.active .modal-content{transform:translateY(0)}
        .modal-handle{width:40px;height:4px;background:var(--outline);border-radius:2px;margin:0 auto 20px}
        .modal h2{font-size:20px;font-weight:500;margin-bottom:20px}
        .acc-opt{display:flex;align-items:center;gap:16px;padding:16px;border:1px solid var(--outline);border-radius:12px;margin-bottom:12px;cursor:pointer}
        .acc-opt img{width:48px;height:48px;border-radius:50%}
        .acc-opt h3{font-size:16px;font-weight:500;margin-bottom:4px}
        .acc-opt p{font-size:13px;color:var(--on-surface-variant)}
    </style>
</head>
<body>
    <div class="phone-frame">
        <div class="status-bar">
            <span class="status-time" id="clock">9:41</span>
            <div class="status-icons">
                <svg viewBox="0 0 24 24"><path d="M1 9l2 2c4.97-4.97 13.03-4.97 18 0l2-2C16.93 2.93 7.08 2.93 1 9zm8 8l3 3 3-3c-1.65-1.66-4.34-1.66-6 0zm-4-4l2 2c2.76-2.76 7.24-2.76 10 0l2-2C15.14 9.14 8.87 9.14 5 13z"/></svg>
                <svg viewBox="0 0 24 24"><path d="M15.67 4H14V2h-4v2H8.33C7.6 4 7 4.6 7 5.33v15.33C7 21.4 7.6 22 8.33 22h7.33c.74 0 1.34-.6 1.34-1.33V5.33C17 4.6 16.4 4 15.67 4z"/></svg>
            </div>
        </div>
        <div class="app-bar">
            <h1>Mail Downloader</h1>
            <button class="icon-btn" onclick="refresh()"><svg viewBox="0 0 24 24"><path d="M17.65 6.35C16.2 4.9 14.21 4 12 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08c-.82 2.33-3.04 4-5.65 4-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/></svg></button>
            <button class="icon-btn" onclick="showFilters()"><svg viewBox="0 0 24 24"><path d="M10 18h4v-2h-4v2zM3 6v2h18V6H3zm3 7h12v-2H6v2z"/></svg></button>
        </div>
        <div id="inbox" class="tab active">
            <div class="search-bar" onclick="alert('Search: subjects, senders, filenames, dates, sizes')">
                <svg viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
                <input placeholder="Search emails with attachments..." readonly>
            </div>
            <div class="accounts-scroll">
                <div class="account-chip active" onclick="selAcc(0)"><img src="https://ssl.gstatic.com/ui/v1/icons/mail/r/logo_gmail_pc_default_2x.png"><span>Gmail</span><div class="dot"></div></div>
                <div class="account-chip" onclick="selAcc(1)"><img src="https://ssl.gstatic.com/images/branding/product/1x/outlook_64dp.png"><span>Outlook</span><div class="dot"></div></div>
                <div class="account-chip" onclick="selAcc(2)"><span style="font-size:20px">Y!</span><span>Yahoo</span><div class="dot"></div></div>
                <div class="account-chip" onclick="selAcc(3)"><span style="font-size:20px">+</span><span>Add</span></div>
            </div>
            <div class="email-list">
                <div class="section-header"><h2>Emails with Attachments</h2><span onclick="refresh()">Refresh</span></div>
                <div id="emails"></div>
            </div>
        </div>
        <div id="downloads" class="tab">
            <div class="section-header" style="padding:16px"><h2>Recent Downloads</h2></div>
            <div id="dlList" style="padding:0 16px"></div>
        </div>
        <div id="settings" class="tab">
            <div style="padding:16px">
                <div class="section-header" style="padding:0 0 16px"><h2>Settings</h2></div>
                <div style="display:flex;align-items:center;gap:16px;padding:16px 0;border-bottom:1px solid var(--outline);cursor:pointer" onclick="alert('Connected accounts:\n• Gmail (OAuth2)\n• Outlook (OAuth2)\nSecurity: TLS 1.3')">
                    <svg width="24" height="24" fill="var(--on-surface-variant)" viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4z"/><path d="M12 14c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
                    <div><div style="font-size:15px;font-weight:500">Account Settings</div><div style="font-size:13px;color:var(--on-surface-variant)">2 accounts connected</div></div>
                </div>
                <div style="display:flex;align-items:center;gap:16px;padding:16px 0;border-bottom:1px solid var(--outline);cursor:pointer" onclick="alert('Download Settings:\n• Folder: /Downloads/MailDownloader\n• WiFi only: ON\n• Naming: {sender}_{date}')">
                    <svg width="24" height="24" fill="var(--on-surface-variant)" viewBox="0 0 24 24"><path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/></svg>
                    <div><div style="font-size:15px;font-weight:500">Download Settings</div><div style="font-size:13px;color:var(--on-surface-variant)">Folder, naming rules</div></div>
                </div>
                <div style="display:flex;align-items:center;gap:16px;padding:16px 0;border-bottom:1px solid var(--outline)">
                    <svg width="24" height="24" fill="var(--on-surface-variant)" viewBox="0 0 24 24"><path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4z"/></svg>
                    <div><div style="font-size:15px;font-weight:500">Security & Privacy</div><div style="font-size:13px;color:var(--on-surface-variant)">TLS 1.3 • OAuth2 • Local only</div></div>
                </div>
                <div style="display:flex;align-items:center;gap:16px;padding:16px 0;border-bottom:1px solid var(--outline);cursor:pointer" onclick="alert('Auto Sync:\n• Enabled\n• Every 15 minutes\n• WiFi only: ON')">
                    <svg width="24" height="24" fill="var(--on-surface-variant)" viewBox="0 0 24 24"><path d="M11.99 2C6.47 2 2 6.48 2 12s4.47 10 9.99 10C17.52 22 22 17.52 22 12S17.52 2 11.99 2zM12 20c-4.42 0-8-3.58-8-8s3.58-8 8-8 8 3.58 8 8-3.58 8-8 8z"/><path d="M12.5 7H11v6l5.25 3.15.75-1.23-4.5-2.67z"/></svg>
                    <div><div style="font-size:15px;font-weight:500">Schedule Downloads</div><div style="font-size:13px;color:var(--on-surface-variant)">Every 15 minutes</div></div>
                </div>
            </div>
        </div>
        <nav class="bottom-nav">
            <div class="nav-item active" onclick="switchTab('inbox')"><svg viewBox="0 0 24 24"><path d="M20 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z"/></svg><span>Inbox</span></div>
            <div class="nav-item" onclick="switchTab('downloads')"><svg viewBox="0 0 24 24"><path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/></svg><span>Downloads</span></div>
            <div class="nav-item" onclick="switchTab('settings')"><svg viewBox="0 0 24 24"><path d="M19.14 12.94c.04-.31.06-.63.06-.94 0-.31-.02-.63-.06-.94l2.03-1.58c.18-.14.23-.41.12-.61l-1.92-3.32c-.12-.22-.37-.29-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54c-.04-.24-.24-.41-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.04.31-.06.63-.06.94s.02.63.06.94l-2.03 1.58c-.18.14-.23.41-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z"/></svg><span>Settings</span></div>
        </nav>
        <button class="fab" onclick="refresh()"><svg viewBox="0 0 24 24"><path d="M17.65 6.35C16.2 4.9 14.21 4 12 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08c-.82 2.33-3.04 4-5.65 4-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/></svg></button>
    </div>
    <script>
        const emails=[{id:1,from:"Dropbox",col:"#0061FF",sub:"Your shared folder is ready",prev:"Sarah shared 'My Project Files' with you...",time:"2 min",has:true,att:{name:"Project_Files.zip",size:"24.5 MB",icon:"📦"}},{id:2,from:"Amazon",col:"#FF9900",sub:"Your order has shipped",prev:"Track your package...",time:"15 min",has:true,att:{name:"Invoice_March.pdf",size:"1.2 MB",icon:"📄"}},{id:3,from:"Mom",col:"#E91E63",sub:"Photos from Sunday",prev:"Here are all the photos from dinner...",time:"1 hour",has:true,att:{name:"Dinner_Photos.zip",size:"156 MB",icon:"🖼️"}},{id:4,from:"HR Dept",col:"#4CAF50",sub:"Q1 2025 Report",prev:"Quarterly report for review...",time:"2 hours",has:true,att:{name:"Q1_Report.xlsx",size:"2.8 MB",icon:"📊"}},{id:5,from:"Stripe",col:"#635BFF",sub:"Payment received",prev:"$4,500 from Acme Corp...",time:"Yesterday",has:true,att:{name:"Receipt.pdf",size:"245 KB",icon:"💳"}},{id:6,from:"GitHub",col:"#24292E",sub:"Pull request merged",prev:"Your PR #247 has been merged...",time:"Yesterday",has:false},{id:7,from:"LinkedIn",col:"#0077B5",sub:"5 people viewed your profile",prev:"See who viewed your profile...",time:"2 days",has:false}];
        function render(){document.getElementById('emails').innerHTML=emails.map(e=>`<div class="email-item ${e.has?'has-attachment':''}" onclick="e.has&&alert('From: ${e.from}\\nSubject: ${e.sub}\\n\\nPreview: ${e.prev}\\n\\nAttachment: ${e.att?e.att.name+' ('+e.att.size+')':'None'}')"><div class="email-avatar" style="background:${e.col}">${e.from.charAt(0)}</div><div class="email-content"><div class="email-header"><span class="email-from">${e.from}</span><span class="email-time">${e.time}</span></div><div class="email-subject">${e.sub}</div><div class="email-preview">${e.prev}</div>${e.has?`<div class="attach-preview"><div class="attach-icon">${e.att.icon}</div><div class="attach-info"><div class="attach-name">${e.att.name}</div><div class="attach-size">${e.att.size}</div></div><button class="dl-btn" onclick="event.stopPropagation();dl(${e.id})">Download</button></div>`:''}</div></div>`).join('')}
        function dl(id){const e=emails.find(x=>x.id===id);if(!e||!e.att)return;const d=document.getElementById('dlList');const i='dl'+Date.now();d.innerHTML=`<div class="dl-item" id="${i}"><div class="dl-icon">${e.att.icon}</div><div class="dl-info"><div class="dl-name">${e.att.name}</div><div class="dl-status" id="${i}s">Downloading...</div><div class="prog"><div class="prog-fill" id="${i}p"></div></div></div></div>`+d.innerHTML;let p=0;const int=setInterval(()=>{p+=Math.random()*20;if(p>=100){p=100;clearInterval(int);document.getElementById(i+'s').textContent='Downloaded ✓';document.getElementById(i+'p').style.width='100%'}else{document.getElementById(i+'s').textContent=Math.round(p)+'%';document.getElementById(i+'p').style.width=p+'%'}},150);switchTab('downloads')}
        function switchTab(t){document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));document.querySelectorAll('.nav-item').forEach(x=>x.classList.remove('active'));document.getElementById(t).classList.add('active');document.querySelector(`.nav-item[onclick="switchTab('${t}')"]`).classList.add('active')}
        function refresh(){const c=document.getElementById('emails');c.innerHTML='<div class="loading"><div class="spinner"></div><p>Checking emails...</p></div>';setTimeout(render,800)}
        function selAcc(i){document.querySelectorAll('.account-chip').forEach((x,j)=>x.classList.toggle('active',j===i))}
        function showFilters(){alert('Filter by:\n• File type (PDF, Images, Docs)\n• Sender\n• Date range\n• Size (>1MB, >10MB)');}
        function updateClock(){const n=new Date();document.getElementById('clock').textContent=n.getHours()+':'+n.getMinutes().toString().padStart(2,'0')}
        render();updateClock();setInterval(updateClock,60000);
    </script>
</body>
</html>
